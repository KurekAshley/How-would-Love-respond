<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">

  <style>
    .black { stroke:#000000; fill:none; stroke-width:2; }
    .gray { stroke:#888888; fill:none; stroke-width:1.5; }
    .red { stroke:#C00000; fill:none; stroke-width:2.5; }
    .text { font-family: Inter, Helvetica, Arial, sans-serif; font-size:20px; fill:#000000; text-anchor:middle; }
    .subtext { font-family: Inter, Helvetica, Arial, sans-serif; font-size:14px; fill:#666666; text-anchor:middle; }
    .redtext { font-family: Inter, Helvetica, Arial, sans-serif; font-size:18px; fill:#C00000; text-anchor:start; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; font-size:16px; fill:#888888; text-anchor:start; }
  </style>

  <!-- Event Node -->
  <rect x="250" y="50" width="300" height="80" rx="8" class="gray"/>
  <text x="400" y="95" class="text">Event</text>
  <text x="400" y="115" class="subtext">(External Stimulus)</text>

  <!-- Arrow Down -->
  <line x1="400" y1="130" x2="400" y2="170" class="black"/>

  <!-- Perception -->
  <rect x="250" y="170" width="300" height="80" rx="8" class="black"/>
  <text x="400" y="215" class="text">Perception</text>

  <!-- Arrow -->
  <line x1="400" y1="250" x2="400" y2="290" class="black"/>

  <!-- Perturbation -->
  <rect x="250" y="290" width="300" height="80" rx="8" class="black"/>
  <text x="400" y="335" class="text">Perturbation</text>

  <!-- Arrow -->
  <line x1="400" y1="370" x2="400" y2="410" class="black"/>

  <!-- Procession -->
  <rect x="250" y="410" width="300" height="80" rx="8" class="black"/>
  <text x="400" y="455" class="text">Procession</text>

  <!-- Arrow -->
  <line x1="400" y1="490" x2="400" y2="530" class="black"/>

  <!-- Result Node -->
  <rect x="250" y="530" width="300" height="80" rx="8" class="gray"/>
  <text x="400" y="575" class="text">Result</text>
  <text x="400" y="595" class="subtext">(Outcome)</text>

  <!-- Recursive Loop -->
  <path d="M 550 570 C 700 570, 700 200, 550 210" class="gray"/>

  <!-- Red Interrupt Arrow -->
  <line x1="650" y1="330" x2="550" y2="450" class="red"/>
  <text x="660" y="320" class="redtext">How would love respond?</text>

  <!-- Area of Influence Bracket -->
  <line x1="150" y1="180" x2="150" y2="480" class="gray"/>
  <line x1="150" y1="180" x2="170" y2="180" class="gray"/>
  <line x1="150" y1="480" x2="170" y2="480" class="gray"/>
  <text x="100" y="330" class="label" transform="rotate(-90 100,330)">Area of Influence</text>

</svg>
